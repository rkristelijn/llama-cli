name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        run: |
          VER=$(jq -r '.git_cliff' .config/versions.json)
          echo "Version: $VER"
          wget -q https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz
          ls -la
          ls -la git-cliff-${VER}-x86_64-unknown-linux-gnu/ || echo "Directory not found"
          sudo mv git-cliff-${VER}-x86_64-unknown-linux-gnu/git-cliff /usr/local/bin/
          rm -rf git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz git-cliff-${VER}-x86_64-unknown-linux-gnu

      - name: Build Linux
        run: |
          make clean
          make
          ls -la

      - name: Create tag
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Generate CHANGELOG.md
        run: |
          git-cliff --config .config/cliff.toml --output CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-cli
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false