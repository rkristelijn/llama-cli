name: Release

on:
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.calc.outputs.VERSION }}
      tag: ${{ steps.calc.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate next version from commits
        id: calc
        run: |
          # Get latest tag or default to v0.0.0
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Parse current version
          VER="${LAST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$VER"

          # Analyze commits since last tag
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^feat(\(.*\))?!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.*\))?:'; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          NEW="${major}.${minor}.${patch}"
          echo "Bump: $BUMP -> $NEW"
          echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          echo "TAG=v$NEW" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: llama-cli-linux-x64
          - os: ubuntu-latest
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: llama-cli-linux-arm64
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=.config/cmake/aarch64-linux-gnu.cmake"
          - os: macos-14
            runner: macos-14
            target: aarch64-apple-darwin
            binary: llama-cli-macos-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build ${{ matrix.target }}
        run: |
          make clean
          cmake -B build -S . ${{ matrix.cmake_flags }}
          cmake --build build --target llama-cli
          cp build/llama-cli ${{ matrix.binary }}
          ls -la ${{ matrix.binary }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Install git-cliff
        run: |
          source .config/versions.env
          VER="${GIT_CLIFF_VERSION}"
          wget -q "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p temp-cliff
          tar -xzf "git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" -C temp-cliff
          sudo find temp-cliff -name "git-cliff" -type f -exec mv {} /usr/local/bin/ \;
          sudo chmod +x /usr/local/bin/git-cliff
          rm -rf temp-cliff "git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz"

      - name: Create tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Generate CHANGELOG.md
        run: git-cliff --config .config/cliff.toml --output CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
