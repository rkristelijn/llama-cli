name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

jobs:
  # Read version once and pass to all build jobs
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Build for Linux ARM64
  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build aarch64-unknown-linux-gnu
        run: |
          make clean
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=.config/cmake/aarch64-linux-gnu.cmake
          cmake --build build --target llama-cli
          cp build/llama-cli llama-cli-linux-arm64
          ls -la llama-cli-linux-arm64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: llama-cli-linux-arm64
          path: llama-cli-linux-arm64
          retention-days: 1

  # Create tag and release after build completes
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Install git-cliff
        run: |
          VER=$(jq -r '.git_cliff' .config/versions.json)
          wget -q "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p temp-cliff
          tar -xzf "git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" -C temp-cliff
          sudo find temp-cliff -name "git-cliff" -type f -exec mv {} /usr/local/bin/ \;
          sudo chmod +x /usr/local/bin/git-cliff
          rm -rf temp-cliff "git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz"
          git-cliff --version

      - name: Create tag
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Generate CHANGELOG.md
        run: |
          git-cliff --config .config/cliff.toml --output CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false