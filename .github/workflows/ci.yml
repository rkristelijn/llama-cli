name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - uses: dorny/paths-filter@de90cc6f # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - 'scripts/**'

  version-bump:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
        with:
          fetch-depth: 0
      - name: Fetch main
        run: git fetch origin main
      - name: Check VERSION was bumped
        run: |
          if ! git diff origin/main -- VERSION | grep -q '^+[^+]'; then
            echo "FAIL: VERSION file was not changed."
            exit 1
          fi

  # --- Lint (no build, fast) ---

  format:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: make cpp-format

  yamllint:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh yamllint
      - run: make yamllint

  markdownlint:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh rumdl
      - run: make markdownlint

  # --- Build ---

  build:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: make build

  # --- Test ---

  test:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: make test

  e2e:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: make e2e

  sanitizers:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - name: Build and test with ASan/UBSan
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation

  coverage:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh lcov bc
      - run: make coverage
      - name: Generate and check coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/doctest/*' '*/httplib/*' --output-file coverage.info --ignore-errors unused
          PERCENT=$(lcov --summary coverage.info | grep "lines......" | cut -d' ' -f4 | cut -d'%' -f1)
          echo "Total Line Coverage: $PERCENT%"
          [ "$(echo "$PERCENT < 55" | bc -l)" -eq 0 ] || { echo "Coverage below 55%!"; exit 1; }
      - uses: codecov/codecov-action@e28ff129 # v4.5.0
        with:
          files: coverage.info
          fail_ci_if_error: false

  # --- Analysis (build-dependent) ---

  clang-tidy:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            make FULL=1 tidy
          else
            make tidy
          fi

  complexity:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh pmccabe
      - run: make complexity

  cppcheck:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cppcheck
      - run: make lint

  doxygen:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: bash scripts/ci/install-deps.sh doxygen
      - run: make docs

  # --- Security ---

  semgrep:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
      - run: make sast-security

  gitleaks:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e11487 # v4.3.1
        with:
          fetch-depth: 0
      - run: bash scripts/ci/install-deps.sh gitleaks
      - run: make sast-secret
