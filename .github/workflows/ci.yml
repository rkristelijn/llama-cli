name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check VERSION was bumped
        run: |
          if git diff origin/main...HEAD -- VERSION | grep -q '^+[^+]'; then
            echo "PASS: VERSION was updated"
          else
            echo "FAIL: VERSION file was not changed. Bump the version before merging to main."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y cloc
      - name: Run tests
        run: make test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: find src include test -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy
      - name: Run clang-tidy
        run: clang-tidy src/*.cpp -- -std=c++17 -I include/ 2>&1 | grep "warning:" && exit 1 || true

  pmccabe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pmccabe
        run: sudo apt-get install -y pmccabe
      - name: Check complexity
        run: pmccabe src/*.cpp | awk '$1 > 10 {print; found=1} END {if (found) exit 1}'

  doxygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Ubuntu apt has doxygen 1.9 which falsely parses function bodies as declarations.
      # We install 1.16.1 from doxygen.nl to match the local dev version.
      # See: https://www.doxygen.nl/download.html
      - name: Install doxygen 1.16.1
        run: |
          wget -q https://www.doxygen.nl/files/doxygen-1.16.1.linux.bin.tar.gz
          tar xzf doxygen-1.16.1.linux.bin.tar.gz
          sudo cp doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen
      - name: Doxygen lint
        run: doxygen Doxyfile 2>&1 | grep "warning:" | grep -v "No output formats\|Unsupported xml" && exit 1 || true

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: cppcheck --enable=all --suppress=missingIncludeSystem --suppress=missingInclude --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=useStlAlgorithm --error-exitcode=1 -I include/ src/

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with sanitizers
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
      - name: Run tests under ASan/UBSan
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y lcov
      - name: Build with coverage
        run: |
          cmake -B build -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build
      - name: Run tests
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/doctest/*' '*/httplib/*' --output-file coverage.info --ignore-errors unused
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
      - name: Check coverage threshold (>= 80%)
        run: |
          for src in config json repl command annotation; do
            gcda="build/CMakeFiles/test_${src}.dir/src/${src}.cpp.gcda"
            [ ! -f "$gcda" ] && continue
            pct=$(gcov -n "$gcda" 2>&1 | grep -A1 "src/${src}.cpp" | grep "Lines" | head -1 | grep -o '[0-9]*\.[0-9]*' | head -1 | cut -d. -f1)
            echo "src/${src}.cpp: ${pct}%"
            if [ "$pct" -lt 80 ]; then echo "FAIL: src/${src}.cpp below 80%"; exit 1; fi
          done
          echo "PASS: all files >= 80%"

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
