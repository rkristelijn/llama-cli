name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SKIP_DEPS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---
  # Gate: detect changes, compute flags
  # ---
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      src: ${{ steps.filter.outputs.src }}
      docs: ${{ steps.filter.outputs.docs }}
      yaml: ${{ steps.filter.outputs.yaml }}
      scripts: ${{ steps.filter.outputs.scripts }}
      heavy: ${{ steps.heavy.outputs.run }}
      skip_build: ${{ steps.ann.outputs.skip_build }}
      skip_test: ${{ steps.ann.outputs.skip_test }}
      skip_lint: ${{ steps.ann.outputs.skip_lint }}
      skip_sast: ${{ steps.ann.outputs.skip_sast }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - '.config/**'
            src:
              - 'src/**'
              - 'CMakeLists.txt'
            docs:
              - '**/*.md'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            scripts:
              - 'scripts/**'
              - 'Makefile'
      - id: heavy
        env:
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$IS_DRAFT" == "false" ]] || \
             [[ "$REF" == "refs/heads/main" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - id: ann
        run: |
          MSG=$(git log -1 --pretty=%B)
          skip_build=false; skip_test=false
          skip_lint=false; skip_sast=false
          if echo "$MSG" | grep -qiE '\[skip build\]|\[only (docs|lint)\]'; then
            skip_build=true; fi
          if echo "$MSG" | grep -qiE '\[skip test\]|\[only (docs|lint)\]'; then
            skip_test=true; fi
          if echo "$MSG" | grep -qiE '\[skip lint\]|\[only (docs|test)\]'; then
            skip_lint=true; fi
          if echo "$MSG" | grep -qiE '\[skip sast\]|\[only (docs|lint|test)\]'; then
            skip_sast=true; fi
          echo "skip_build=$skip_build" >> "$GITHUB_OUTPUT"
          echo "skip_test=$skip_test" >> "$GITHUB_OUTPUT"
          echo "skip_lint=$skip_lint" >> "$GITHUB_OUTPUT"
          echo "skip_sast=$skip_sast" >> "$GITHUB_OUTPUT"

  # ---
  # Group: Lint (code quality, no build needed)
  # ---
  lint-code:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_lint != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm cppcheck pmccabe doxygen cloc
      - run: make lint-format-code
      - run: make lint-cppcheck
      - run: make complexity
      - run: make docs
      - run: make comment-ratio
      - run: make file-size
      - run: make consistency
      - run: make check-theme
      - run: make check-xref
      - run: make check-interactive-input
      - run: make check-unicode
      - run: make check-portability
      - run: make slop

  lint-tidy:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_lint != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: make tidy

  lint-config:
    needs: changes
    if: needs.changes.outputs.scripts == 'true' && needs.changes.outputs.skip_lint != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh yamllint
      - run: make lint-makefile
      - run: make lint-scripts
      - run: make lint-yaml
      - run: make lint-versions

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' && needs.changes.outputs.skip_lint != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh rumdl
      - run: make lint-md

  # ---
  # Group: Build + Test (sequential dependency chain)
  # ---
  build:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_build != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build

  test:
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_test != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build test-unit
      - run: make e2e
      - name: Count scenarios (for badge)
        if: github.ref == 'refs/heads/main'
        run: |
          total=0
          for t in build/test_*; do
            [ -x "$t" ] || continue
            count=$("$t" --list-test-cases 2>/dev/null | wc -l)
            total=$((total + count))
          done
          echo "SCENARIOS=$total" >> "$GITHUB_ENV"
      - name: Update test badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.BADGE_TOKEN }}
          gistID: a190f75bd7e08ea08f9c16f90571213f
          filename: tests.json
          label: Tests
          message: ${{ env.SCENARIOS }} scenarios
          color: blue

  feature-coverage:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_test != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build
      - run: bash scripts/test/check-feature-coverage.sh build
      - name: Update features badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.BADGE_TOKEN }}
          gistID: a190f75bd7e08ea08f9c16f90571213f
          filename: features.json
          label: E2E Features
          message: 49/51
          color: brightgreen

  # ---
  # Group: Security (parallel scans)
  # ---
  sast:
    needs: changes
    if: needs.changes.outputs.skip_sast != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: bash scripts/ci/install-deps.sh gitleaks trufflehog grype
      - run: make sast-secret
      - run: make sast-trufflehog
      - run: make sast-grype

  sast-semgrep:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_sast != 'true'
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: semgrep scan --config auto --error --quiet

  # ---
  # Group: Metrics (code health analysis)
  # ---
  metrics:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cppcheck
      - run: make dead-code
      - run: make dead-docs
      - run: make duplication

  # ---
  # Group: Heavy (non-draft PR or main only)
  # ---
  build-macos:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build

  test-coverage:
    needs: [changes, test]
    if: needs.changes.outputs.src == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh lcov bc
      - run: make coverage
      - name: Check coverage threshold
        run: |
          lcov --capture --directory build \
            --output-file coverage.info \
            --ignore-errors mismatch,unused,negative,gcov
          lcov --remove coverage.info \
            '/usr/*' '*_test.cpp' '*_it.cpp' '*_test_helper.cpp' \
            '*/doctest/*' '*/httplib-src/*' '*/dtl-src/*' \
            '*/linenoise-src/*' '*/test_helpers.h' \
            --output-file coverage.info --ignore-errors unused
          PERCENT=$(lcov --summary coverage.info \
            | grep "lines......" | cut -d' ' -f4 | cut -d'%' -f1)
          echo "Total Line Coverage: $PERCENT%"
          if [ "$(echo "$PERCENT < 53" | bc -l)" -eq 1 ]; then
            echo "Coverage below 53% (ratchet floor)!"; exit 1
          fi
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      # nosemgrep
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sanitizers:
    needs: [changes, test]
    if: needs.changes.outputs.src == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build with ASan/UBSan
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build --parallel $(nproc)
      - name: Run sanitized tests
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_command
          ./build/test_exec
          ./build/test_annotation
          ./build/test_repl
          ./build/test_markdown
