name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SKIP_DEPS: 1

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - 'scripts/**'
              - '.config/**'

  version-bump:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Fetch main
        run: git fetch origin main
      - name: Check VERSION was bumped
        run: |
          if ! git diff origin/main -- VERSION | grep -q '^+[^+]'; then
            echo "FAIL: VERSION file was not changed."
            exit 1
          fi

  # --- Lint (no build, fast) ---

  lint-cpp:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: make cpp-format

  lint-yaml:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh yamllint
      - run: make yamllint

  lint-markdown:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh rumdl
      - run: make markdownlint

  lint-makefile:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make lint-makefile

  lint-scripts:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make lint-scripts

  lint-tidy:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            make FULL=1 tidy
          else
            make tidy
          fi

  lint-cppcheck:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cppcheck
      - run: make lint

  lint-docs:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh doxygen
      - run: make docs

  lint-complexity:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh pmccabe
      - run: make complexity

  # --- Build ---

  build:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build

  # --- Test ---

  unit-test:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make test

  e2e-test:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make e2e

  test-coverage:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh lcov bc
      - run: make coverage
      - name: Generate and check coverage
        run: |
          lcov --capture --directory build \
            --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info \
            '/usr/*' '*_test.cpp' '*_it.cpp' '*_test_helper.cpp' \
            '*/doctest/*' '*/httplib-src/*' '*/dtl-src/*' \
            '*/linenoise-src/*' '*/test_helpers.h' \
            --output-file coverage.info --ignore-errors unused
          PERCENT=$(lcov --summary coverage.info \
            | grep "lines......" | cut -d' ' -f4 | cut -d'%' -f1)
          echo "Total Line Coverage: $PERCENT%"
          if [ "$(echo "$PERCENT < 50" | bc -l)" -eq 1 ]; then
            echo "Coverage below 50%!"; exit 1
          fi
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.info
          fail_ci_if_error: false

  sanitizers:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build and test with ASan/UBSan
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation
          ./build/test_exec

  # --- Security ---

  sast-security:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Run semgrep directly — the semgrep/semgrep container is Alpine-based and has no make
      - run: semgrep scan --config auto --error --quiet

  sast-secret:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: bash scripts/ci/install-deps.sh gitleaks
      - run: make sast-secret

  # --- Metrics ---

  comment-ratio:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cloc
      - run: bash scripts/check/comment-ratio.sh
