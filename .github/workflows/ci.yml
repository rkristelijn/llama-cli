name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detect what changed to skip unnecessary jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - '.config/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'INDEX.md'
              - 'CONTRIBUTING.md'

  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main
        run: git fetch origin main
      - name: Check VERSION was bumped
        run: |
          if ! git diff origin/main -- VERSION | grep -q '^+[^+]'; then
            echo "FAIL: VERSION file was not changed. Bump the version before merging to main."
            exit 1
          fi
          echo "PASS: VERSION was updated"

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y cloc
      - name: Run tests
        run: make test

  e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Run E2E tests
        run: make e2e

  format:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format (pinned)
        run: |
          VER=$(jq -r '.["clang-format"]' .config/versions.json)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y clang-format-${VER}
      - name: Check formatting
        run: |
          VER=$(jq -r '.["clang-format"]' .config/versions.json)
          find src -name '*.cpp' -o -name '*.h' | xargs clang-format-${VER} --dry-run -Werror --style=file:.config/.clang-format

  clang-tidy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy (pinned)
        run: |
          VER=$(jq -r '.["clang-tidy"]' .config/versions.json)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y clang-tidy-${VER}
      - name: Run clang-tidy
        run: |
          VER=$(jq -r '.["clang-tidy"]' .config/versions.json)
          find src -name '*.cpp' -print0 | xargs -0 clang-tidy-${VER} --config-file=.config/.clang-tidy -- -std=c++17 -I src/ 2>&1 | grep "warning:" | grep -v "linenoise\|SCENARIO\|cognitive complexity\|identifier-naming\|logging/logger.*function-size" && exit 1 || true

  pmccabe:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pmccabe
        run: sudo apt-get install -y pmccabe
      - name: Check complexity
        run: |
          find src -name '*.cpp' | xargs pmccabe 2>/dev/null | while read line; do
            file=$(echo $line | awk '{print $6}' | cut -d'(' -f1)
            lno=$(echo $line | awk '{print $6}' | cut -d'(' -f2 | cut -d')' -f1)
            if ! head -n $lno $file | tail -n 6 | grep -q "pmccabe:skip-complexity\|clang-tidy:skip-complexity"; then
              echo $line | awk '$1 > 10 {print; exit 1}'
            fi
          done

  doxygen:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install doxygen (pinned)
        run: |
          VER=$(jq -r '.doxygen' .config/versions.json)
          wget https://doxygen.nl/files/doxygen-${VER}.linux.bin.tar.gz
          tar -xzf doxygen-${VER}.linux.bin.tar.gz
          echo "$(pwd)/doxygen-${VER}/bin" >> $GITHUB_PATH
      - name: Doxygen lint
        run: doxygen .config/Doxyfile 2>&1 | grep "warning:" | grep -v "No output formats\|Unsupported xml\|falsely parses" && exit 1 || true

  cppcheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: cppcheck --enable=all --suppress=missingIncludeSystem --suppress=missingInclude --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=useStlAlgorithm --error-exitcode=1 -I src/ src/

  sanitizers:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with sanitizers
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
      - name: Run tests under ASan/UBSan
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y lcov
      - name: Build with coverage
        run: |
          cmake -B build -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build
      - name: Run tests
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation
      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/doctest/*' '*/httplib/*' --output-file coverage.info --ignore-errors unused
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
      - name: Check coverage threshold (>= 80%)
        run: |
          for src in config json repl command annotation; do
            gcda="build/CMakeFiles/test_${src}.dir/src/${src}.cpp.gcda"
            [ ! -f "$gcda" ] && continue
            pct=$(gcov -n "$gcda" 2>&1 | grep -A1 "src/${src}.cpp" | grep "Lines" | head -1 | grep -o '[0-9]*\.[0-9]*' | head -1 | cut -d. -f1)
            echo "src/${src}.cpp: ${pct}%"
            if [ "$pct" -lt 80 ]; then echo "FAIL: src/${src}.cpp below 80%"; exit 1; fi
          done
          echo "PASS: all files >= 80%"

  semgrep:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config auto --error --quiet

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
