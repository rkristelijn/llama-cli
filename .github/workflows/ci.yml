name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SKIP_DEPS: 1

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      src: ${{ steps.filter.outputs.src }}
      docs: ${{ steps.filter.outputs.docs }}
      yaml: ${{ steps.filter.outputs.yaml }}
      scripts: ${{ steps.filter.outputs.scripts }}
      # Computed: heavy jobs only on non-draft PR or main
      heavy: ${{ steps.heavy.outputs.run }}
      # Commit message annotations: [skip build], [skip test], [skip lint], [skip sast]
      skip_build: ${{ steps.annotations.outputs.skip_build }}
      skip_test: ${{ steps.annotations.outputs.skip_test }}
      skip_lint: ${{ steps.annotations.outputs.skip_lint }}
      skip_sast: ${{ steps.annotations.outputs.skip_sast }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - '.config/**'
            src:
              - 'src/**'
              - 'CMakeLists.txt'
            docs:
              - '**/*.md'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            scripts:
              - 'scripts/**'
              - 'Makefile'
      - id: heavy
        env:
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$IS_DRAFT" == "false" ]] || \
             [[ "$REF" == "refs/heads/main" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - id: annotations
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          # Parse [skip X] and [only X] annotations from commit message
          # Supports: [skip ci], [skip build], [skip test], [skip lint],
          #           [skip sast], [only docs], [only lint]
          # Combine: "fix: thing [skip sast] [skip test]"
          skip_build=false
          skip_test=false
          skip_lint=false
          skip_sast=false
          if echo "$MSG" | grep -qiE '\[skip build\]|\[only (docs|lint)\]'; then
            skip_build=true
          fi
          if echo "$MSG" | grep -qiE '\[skip test\]|\[only (docs|lint)\]'; then
            skip_test=true
          fi
          if echo "$MSG" | grep -qiE '\[skip lint\]|\[only (docs|test)\]'; then
            skip_lint=true
          fi
          if echo "$MSG" | grep -qiE '\[skip sast\]|\[only (docs|lint|test)\]'; then
            skip_sast=true
          fi
          echo "skip_build=$skip_build" >> "$GITHUB_OUTPUT"
          echo "skip_test=$skip_test" >> "$GITHUB_OUTPUT"
          echo "skip_lint=$skip_lint" >> "$GITHUB_OUTPUT"
          echo "skip_sast=$skip_sast" >> "$GITHUB_OUTPUT"

  # --- Lint (no build, fast) ---

  lint-cpp:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: make lint-format-code

  lint-yaml:
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh yamllint
      - run: make lint-yaml

  lint-markdown:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh rumdl
      - run: make lint-md

  lint-makefile:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make lint-makefile

  lint-scripts:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make lint-scripts

  lint-tidy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh llvm
      - run: |
          if [ "$GH_REF" = "refs/heads/main" ]; then
            make FULL=1 tidy
          else
            make tidy
          fi
        env:
          GH_REF: ${{ github.ref }}

  lint-cppcheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cppcheck
      - run: make lint-cppcheck

  lint-docs:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh doxygen
      - run: make docs

  lint-complexity:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh pmccabe
      - run: make complexity

  file-size:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make file-size

  # --- Build ---

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_build != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/llama-cli
            build/test_*
          retention-days: 1

  build-macos:
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make build

  # --- Test ---

  unit-test:
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_build != 'true' && needs.changes.outputs.skip_test != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build
      - run: chmod +x build/llama-cli build/test_*
      - run: make test-unit

  e2e-test:
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_build != 'true' && needs.changes.outputs.skip_test != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build
      - run: chmod +x build/llama-cli build/test_*
      - run: make e2e

  feature-coverage:
    needs: [changes, e2e-test]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.skip_build != 'true' && needs.changes.outputs.skip_test != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build
      - run: chmod +x build/llama-cli build/test_*
      - run: bash scripts/test/check-feature-coverage.sh build

  test-coverage:
    needs: changes
    if: needs.changes.outputs.src == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh lcov bc
      - run: make coverage
      - name: Generate and check coverage
        run: |
          lcov --capture --directory build \
            --output-file coverage.info --ignore-errors mismatch,unused,negative,gcov
          lcov --remove coverage.info \
            '/usr/*' '*_test.cpp' '*_it.cpp' '*_test_helper.cpp' \
            '*/doctest/*' '*/httplib-src/*' '*/dtl-src/*' \
            '*/linenoise-src/*' '*/test_helpers.h' \
            --output-file coverage.info --ignore-errors unused
          PERCENT=$(lcov --summary coverage.info \
            | grep "lines......" | cut -d' ' -f4 | cut -d'%' -f1)
          echo "Total Line Coverage: $PERCENT%"
          if [ "$(echo "$PERCENT < 53" | bc -l)" -eq 1 ]; then
            echo "Coverage below 53% (ratchet floor)!"; exit 1
          fi
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      # nosemgrep
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sanitizers:
    needs: changes
    if: needs.changes.outputs.src == 'true' && needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build and test with ASan/UBSan
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation
          ./build/test_exec
          ./build/test_markdown

  # --- Security ---

  sast-security:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Run semgrep directly — the semgrep/semgrep container is Alpine-based and has no make
      - run: semgrep scan --config auto --error --quiet

  sast-secret:
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.skip_sast != 'true'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: bash scripts/ci/install-deps.sh gitleaks
      - run: make sast-secret

  sast-trufflehog:
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.skip_sast != 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: bash scripts/ci/install-deps.sh trufflehog
      - run: make sast-trufflehog

  sast-grype:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh grype
      - run: make sast-grype

  sast-checkov:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh checkov
      - run: make sast-checkov

  lint-versions:
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.skip_sast != 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make lint-versions

  # --- Metrics ---

  comment-ratio:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cloc
      - run: make comment-ratio

  dead-code:
    needs: changes
    if: (needs.changes.outputs.code == 'true' || needs.changes.outputs.scripts == 'true') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/ci/install-deps.sh cppcheck
      - run: make dead-code

  dead-docs:
    needs: changes
    if: (needs.changes.outputs.docs == 'true' || needs.changes.outputs.scripts == 'true') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: make dead-docs

  duplication:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - run: make duplication
