name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detect what changed to skip unnecessary jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'Makefile'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'INDEX.md'
              - 'CONTRIBUTING.md'
              - '.github/**'
              - '.config/**'

  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main
        run: git fetch origin main
      - name: Check VERSION was bumped
        run: |
          if ! git diff origin/main -- VERSION | grep -q '^+[^+]'; then
            echo "FAIL: VERSION file was not changed. Bump the version before merging to main."
            exit 1
          fi
          echo "PASS: VERSION was updated"

  # Build the project
  build:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make

  # Unit tests and comment ratio
  test:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y cloc
      - name: Run tests
        run: make test

  # End-to-end tests (mocked)
  e2e:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: make e2e

  # Formatting check (POSIX-style)
  format:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format (pinned)
        run: |
          VER=$(jq -r '.["clang-format"]' .config/versions.json)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y clang-format-${VER}
      - name: Check formatting
        run: make format-check

  # Static analysis (Clang-Tidy)
  clang-tidy:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy (pinned)
        run: |
          VER=$(jq -r '.["clang-tidy"]' .config/versions.json)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y clang-tidy-${VER}
          sudo ln -s /usr/bin/clang-tidy-${VER} /usr/bin/clang-tidy
      - name: Run clang-tidy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            make FULL=1 tidy
          else
            make tidy
          fi

  # Cyclomatic complexity (pmccabe)
  complexity:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pmccabe
        run: sudo apt-get install -y pmccabe
      - name: Check complexity
        run: make complexity

  # Documentation check
  doxygen:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install doxygen (pinned)
        run: |
          VER=$(jq -r '.doxygen' .config/versions.json)
          wget https://doxygen.nl/files/doxygen-${VER}.linux.bin.tar.gz
          tar -xzf doxygen-${VER}.linux.bin.tar.gz
          echo "$(pwd)/doxygen-${VER}/bin" >> $GITHUB_PATH
      - name: Doxygen lint
        run: make docs

  # Static analysis (cppcheck)
  cppcheck:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: make lint

  # Memory and undefined behavior sanitizers
  sanitizers:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with sanitizers
        run: |
          cmake -B build -DENABLE_SANITIZERS=ON
          cmake --build build
      - name: Run tests under ASan/UBSan
        run: |
          ./build/test_config
          ./build/test_json
          ./build/test_repl
          ./build/test_command
          ./build/test_annotation

  # Code coverage report
  coverage:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y lcov bc
      - name: Run coverage
        run: make coverage
      - name: Generate coverage.info for Codecov
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,unused
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/doctest/*' '*/httplib/*' --output-file coverage.info --ignore-errors unused
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
      - name: Check coverage threshold (>= 55%)
        run: |
          PERCENT=$(lcov --summary coverage.info | grep "lines......" | cut -d' ' -f4 | cut -d'%' -f1)
          echo "Total Line Coverage: $PERCENT%"
          if [ "$(echo "$PERCENT < 55" | bc -l)" -eq 1 ]; then
            echo "Coverage is below 55%!"
            exit 1
          fi
          echo "PASS: coverage >= 55%"

  # SAST (Semgrep)
  semgrep:
    needs: changes
    if: (needs.changes.outputs.code == 'true' && github.event_name == 'pull_request') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: make sast-security

  # SAST (Gitleaks)
  gitleaks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: make sast-secret
