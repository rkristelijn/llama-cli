# =============================================================================
# SonarCloud configuration for llama-cli
#
# This file is picked up automatically by sonar-scanner.
# Rule exclusions are documented with rationale per ADR-053.
# =============================================================================

sonar.organization=rkristelijn
sonar.projectKey=rkristelijn_llama-cli
sonar.projectName=llama-cli
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.host.url=https://sonarcloud.io

# C++ analysis via compile_commands.json (generated by cmake)
sonar.cfamily.compile-commands=build/compile_commands.json
sonar.cfamily.gcov.reportsPath=build
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=.cpp,.h
sonar.objc.file.suffixes=-

# ---------------------------------------------------------------------------
# Rule exclusions — each with rationale
# ---------------------------------------------------------------------------

# S7040: "Replace \033 with \o{33}" — C++23 octal escape syntax.
# This project targets C++17. The \033[ sequences are standard ANSI escape
# codes used for terminal colors and formatting throughout the codebase.
# Replacing them would break compatibility with C++17 compilers.
sonar.issue.ignore.multicriteria=e1,e2,e3

sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S7040
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**

# Shell: "Add explicit return" — bash functions implicitly return last command's
# exit status. Adding return 0 everywhere is noise, not a bug.
sonar.issue.ignore.multicriteria.e2.ruleKey=shelldre:S7688
sonar.issue.ignore.multicriteria.e2.resourceKey=scripts/**

# Shell: "Redirect error to stderr" — valid but low-value for dev scripts
# that only output to terminal. We fix these incrementally.
sonar.issue.ignore.multicriteria.e3.ruleKey=shelldre:S7682
sonar.issue.ignore.multicriteria.e3.resourceKey=scripts/**

# Exclude test files from copy-paste detection — test code is intentionally
# repetitive (setup/assert/teardown patterns per ADR-008)
sonar.cpd.exclusions=**/*_test.cpp,**/*_it.cpp,**/*_extra_test.cpp
