# rumdl configuration — Rust markdown linter
# @see https://rumdl.dev/global-settings
# @see docs/adr/adr-44-tidy-boilerplate.md

[global]
exclude = ["build", "node_modules"]
respect-gitignore = true
cache-dir = ".tmp/rumdl"
# MD013: line length — too many existing violations in ADRs/docs
# MD033: inline HTML — used in some docs
# MD036: emphasis as heading — used in ADR-023
# MD041: first line heading — some docs have frontmatter
# MD046: code block style — mixed in code-rabbit.md
disable = ["MD013", "MD033", "MD036", "MD041", "MD046"]
