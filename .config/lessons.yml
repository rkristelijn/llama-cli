# lessons.yml — Accumulated code and test lessons (auto-generated by learn.sh)
# Each entry is a best practice discovered through analysis.
# New lessons are appended by scripts/dev/learn.sh on each run.
#
# Format:
#   category:
#     - lesson text
#
timing:
  - "Use output-producing commands for timeout tests, not sleep"
  - "Coverage builds add ~2x overhead — assertions must account for this"
  - "Sanitizer builds add ~3x overhead — same timing constraints apply"
assertions:
  - "Test the contract (observable behavior), not implementation details"
  - "json_extract_string handles numeric values as string representation"
  - "Prefer CHECK(result.find(marker) != npos) over CHECK(result.empty())"
isolation:
  - "Tests must pass in: local macOS, CI Ubuntu, coverage build, sanitizer build"
  - "No filesystem side-effects without cleanup in THEN blocks"
  - "Each SCENARIO is independent — no shared mutable state between tests"
naming:
  - "Test names read as documentation: SCENARIO(module: behavior)"
  - "Extract Method names reveal intent: canRide() not checkAgeAndHeight()"
  - "Functions at one abstraction level (SLA principle)"
decomposition:
  - "Extract conditions with 2+ clauses into named functions"
  - "Each function does one thing at one abstraction level"
  - "Compiler inlines small functions — zero runtime cost for extraction"
  - "Only extract when it improves readability, not for the sake of it"
design:
  - "KISS: simplest solution that works — don't over-engineer filters or abstractions"
  - "YAGNI: don't build it until you need it twice"
  - "If a beginner can't understand it in 30 seconds, simplify it"
  - "RTFM: follow official documentation and framework conventions"
  - "C4C (Coding For Clarity): write code that's easy to read and understand"
  - "C4I (Code for Inclusivity): make your code accessible to new team members"
  - "HIPI (Hide Implementation, Present Interface): encapsulate complexity behind clear APIs"
  - "NBI (Naming by Intention): use names that clearly express purpose and behavior"
  - "Automate over manual: fix the tooling, not the symptom — make format > hand-edit"
  - "Idempotent automation: run make format 100x, same result — no manual investigation"
  - "Error messages must answer 3 questions: what failed, why, and what to do about it"
  - Prefer testing the public interface's contract rather than internal implementation details.
  - Verify that assertions test the contract, not the implementation details.
refactoring:
  - "When changing a type (const char* → std::string), change the interface once at the definition — don't chase all call sites"
  - "Prefer adding a lint rule (check-theme.sh) over remembering a convention — automate enforcement"
  - "Auto-fix > manual fix: format-md.sh detects missing code block languages instead of fixing them by hand"
delegation:
  - "Delegate only well-defined, independent tasks — not iterative debug loops"
  - "Sub-agents lack codebase context; they miss cross-platform issues (GCC vs Clang)"
  - "For CI fixes: fix locally, verify build, then push — don't delegate the iteration"
  - "Delegation works for: parallel research, boilerplate generation, test writing"
  - "Delegation fails for: build errors, CI debugging, multi-file refactors needing context"
  - "Always verify with the target compiler (GCC on CI) before pushing — macOS Clang is more permissive"
ci:
  - "GitHub Actions ubuntu-24.04 uses GCC 14 which is stricter than GCC 13 on aggregate init"
  - "Use nullptr (not {}) for std::function in aggregate initialization — GCC 14 rejects {}"
  - "timeout-minutes: 15 is safe for coverage/sanitizer builds (GitHub allows up to 6h)"
  - "Coverage builds add ~2x compile time — budget 15 min for build+test+lcov+upload"
  - "Sanitizer builds add ~1.5x compile time — budget 15 min for build+test"
  - "lint-md and trivy scan build*/ dirs if not excluded — add to .config/rumdl.toml and trivy.yaml"
  - "New code without tests drops coverage — always add _test.cpp with new .cpp files"
  - "LOG_FEATURE() markers need e2e coverage or explicit exclude — check before pushing"
  - "SonarCloud continue-on-error: true — external services must not block coverage gate"
  - "git add -A is dangerous — always stage specific files to avoid committing build dirs"
  - "Run make pipeline-coverage before pushing — catches missing denylist entries"
  - "Pre-push checklist: make build (GCC), make check, make pipeline-coverage"
  - "New feature = new test: no LOG_FEATURE without e2e or exclude-list entry"
  - "Cross-compile check: build with both clang AND gcc locally before pushing"
  - "Tool configs mirror .gitignore: rumdl, trivy, semgrep all need build* exclusions"
  - "SonarCloud + CodeRabbit feedback: run scripts/gh/pr-sonar.sh after first CI pass"
documentation:
  - "Badge links must point to PROOF of the claim, not the script that generates it"
  - "CI badge → workflow runs page, Coverage → codecov dashboard, Tests → unit-test job"
  - "Static badges (Tests: 347) need manual update at release — consider CI auto-update"
demos:
  - "Don't type 'exit' at the end of VHS tapes — it crashes when test output files are open"
  - "VHS Env PS1 doesn't override .bashrc — use Hide + export PS1='$ ' + clear instead"
  - "Use LLAMA_CLI_MOCK_DELAY_MS=1500 to make spinner visible in recordings"
  - "Set HOME=/tmp/demo-home to prevent /mem, /pref from reading real user files"
  - "Shared settings go in _defaults.tape, tapes only contain Output + commands"
workflow:
  - "Never call gh/git CLI directly for workflow actions — always use make targets (make ready, make merge, make create-pr, make status)"
  - "Direct CLI access bypasses the abstraction layer and breaks consistency for other devs/AI"
  - "If a make target doesn't exist for what you need, create one first"
