# lessons.yml — Accumulated code and test lessons (auto-generated by learn.sh)
# Each entry is a best practice discovered through analysis.
# New lessons are appended by scripts/dev/learn.sh on each run.
#
# Format:
#   category:
#     - lesson text
#
timing:
  - "Use output-producing commands for timeout tests, not sleep"
  - "Coverage builds add ~2x overhead — assertions must account for this"
  - "Sanitizer builds add ~3x overhead — same timing constraints apply"
assertions:
  - "Test the contract (observable behavior), not implementation details"
  - "json_extract_string handles numeric values as string representation"
  - "Prefer CHECK(result.find(marker) != npos) over CHECK(result.empty())"
isolation:
  - "Tests must pass in: local macOS, CI Ubuntu, coverage build, sanitizer build"
  - "No filesystem side-effects without cleanup in THEN blocks"
  - "Each SCENARIO is independent — no shared mutable state between tests"
naming:
  - "Test names read as documentation: SCENARIO(module: behavior)"
  - "Extract Method names reveal intent: canRide() not checkAgeAndHeight()"
  - "Functions at one abstraction level (SLA principle)"
decomposition:
  - "Extract conditions with 2+ clauses into named functions"
  - "Each function does one thing at one abstraction level"
  - "Compiler inlines small functions — zero runtime cost for extraction"
  - "Only extract when it improves readability, not for the sake of it"
