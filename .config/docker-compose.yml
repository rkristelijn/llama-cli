# =============================================================================
# Docker services voor lokale development
#
# Gebruik:
#   docker compose -f .config/docker-compose.yml up -d
#   docker compose -f .config/docker-compose.yml down
#
# SearXNG  is beschikbaar op http://localhost:8888
# SonarQube analyse draait via SonarCloud (geen lokale container meer nodig)
# =============================================================================

services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
