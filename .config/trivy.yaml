# Trivy configuration
# @see https://aquasecurity.github.io/trivy/latest/docs/references/configuration/config-file/

scan:
  skip-dirs:
    - build
    - build-fuzz
    - build-gcc
    - build-san
    - build-cov
    - build-test
    - build-mull
    - _deps
    - .tmp
    - .cache
    - node_modules
