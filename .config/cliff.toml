# git-cliff configuration
[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
 ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
 ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
 ### {{ group | upper_first }}
 {% for commit in commits %}
 - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
 {% endfor %}
{% endfor %}\n
"""
footer = ""
sort = "newest"

# Dit is de juiste manier om secties te verdelen in git-cliff
[[changelog.sections]]
group = "💥 Breaking Changes"
filter = "^.*!:"

[[changelog.sections]]
group = "🚀 Features"
filter = "^feat"

[[changelog.sections]]
group = "🐛 Bug Fixes"
filter = "^fix"

[[changelog.sections]]
group = "📚 Documentation"
filter = "^doc"

[[changelog.sections]]
group = "⚡ Performance"
filter = "^perf"

[[changelog.sections]]
group = "♻️ Refactoring"
filter = "^refactor"

[[changelog.sections]]
group = "✅ Testing"
filter = "^test"

[[changelog.sections]]
group = "🔧 Build"
filter = "^build|^ci"

[[changelog.sections]]
group = "🔨 Other"
filter = "^chore|^style"

[git]
conventional_commits = true
filter_unconventional = true
tag_prefix = "v"
ignore_tags = ""