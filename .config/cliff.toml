# git-cliff configuration
[changelog]
header = """
# Changelog\n
"""
footer = ""
sort = "newest"
# Body template for commit messages
body = """
{% for section in sections %}
### {{ section.group }}
{% for commit in section.commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""

# Dit is de juiste manier om secties te verdelen in git-cliff
[[changelog.sections]]
group = "💥 Breaking Changes"
filter = "^.*!:"

[[changelog.sections]]
group = "🚀 Features"
filter = "^feat"

[[changelog.sections]]
group = "🐛 Bug Fixes"
filter = "^fix"

[[changelog.sections]]
group = "📚 Documentation"
filter = "^doc"

[[changelog.sections]]
group = "⚡ Performance"
filter = "^perf"

[[changelog.sections]]
group = "♻️ Refactoring"
filter = "^refactor"

[[changelog.sections]]
group = "✅ Testing"
filter = "^test"

[[changelog.sections]]
group = "🔧 Build"
filter = "^build|^ci"

[[changelog.sections]]
group = "🔨 Other"
filter = "^chore|^style"

[git]
conventional_commits = true
filter_unconventional = true
tag_prefix = "v"
ignore_tags = ""